# Merge with base compose for local API hot-reload:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Binds ./api into the container and runs `nest start --watch`. Edits to TS sources
# reload without rebuilding the image. `api_node_modules` keeps Linux node_modules.

services:
    api:
        build:
            context: ./api
            dockerfile: Dockerfile.dev
        volumes:
            - ./api:/app
            - api_node_modules:/app/node_modules
        environment:
            NODE_ENV: development
            # File watching inside Docker Desktop (macOS/Windows)
            CHOKIDAR_USEPOLLING: "true"
        command: ["npm", "run", "start:dev"]

volumes:
    api_node_modules:
